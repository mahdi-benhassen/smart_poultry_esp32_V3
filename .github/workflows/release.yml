name: Release ESP32 Firmware

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  ESP_IDF_VERSION: v5.3
  PYTHON_VERSION: '3.11'

jobs:
  build-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building release version: $VERSION"
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install ESP-IDF prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget flex bison gperf python3 python3-pip python3-venv \
            cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0
            
      - name: Download ESP-IDF
        run: |
          mkdir -p $HOME/esp
          cd $HOME/esp
          git clone -b ${{ env.ESP_IDF_VERSION }} --recursive --depth 1 \
            https://github.com/espressif/esp-idf.git
          
      - name: Install ESP-IDF
        run: |
          $HOME/esp/esp-idf/install.sh esp32
        shell: bash
        
      - name: Set up ESP-IDF environment
        run: |
          . $HOME/esp/esp-idf/export.sh
          idf.py --version
        shell: bash
        
      - name: Configure project
        run: |
          . $HOME/esp/esp-idf/export.sh
          idf.py reconfigure
        shell: bash
        
      - name: Build firmware
        run: |
          . $HOME/esp/esp-idf/export.sh
          idf.py build
        shell: bash
        
      - name: Rename firmware for release
        run: |
          cd build
          # Find the app binary and rename with version
          for f in *.bin; do
            if [ -f "$f" ]; then
              mv "$f" "smart-poultry-v3-${{ steps.version.outputs.VERSION }}.bin"
            fi
          done
          ls -lh *.bin
          
      - name: Upload firmware asset
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.version.outputs.VERSION }}
          path: |
            build/*.bin
          retention-days: 30
          
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: Smart Poultry V3 v${{ steps.version.outputs.VERSION }}
          body: |
            ## Firmware Release v${{ steps.version.outputs.VERSION }}
            
            ### What's New
            - Download the firmware binary below
            - Flash using ESP32 flash tools
            
            ### Files
            | File | Size |
            |------|------|
            | smart-poultry-v3-${{ steps.version.outputs.VERSION }}.bin | - |
            
            ### Installation
            1. Download the .bin file
            2. Flash using esptool:
               ```bash
               esptool.py --chip esp32 --port /dev/ttyUSB0 write_flash 0x1000 bootloader.bin 0x8000 partition-table.bin 0x10000 smart-poultry-v3-v${{ steps.version.outputs.VERSION }}.bin
               ```
            
            ### Build Information
            - ESP-IDF Version: ${{ env.ESP_IDF_VERSION }}
            - Build Date: ${{ github.run_id }}
            - Commit: ${{ github.sha }}
            
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
          files: |
            build/*.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload release asset
        run: |
          echo "Release created successfully!"
          
  notify:
    runs-on: ubuntu-latest
    needs: build-release
    if: always()
    
    steps:
      - name: Notify on success
        if: needs.build-release.result == 'success'
        run: |
          echo "✅ Release ${{ github.ref_name }} created successfully!"
          
      - name: Notify on failure
        if: needs.build-release.result == 'failure'
        run: |
          echo "❌ Release creation failed!"
          exit 1
