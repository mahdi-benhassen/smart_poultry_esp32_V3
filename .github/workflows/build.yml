name: Build ESP32 Firmware

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  ESP_IDF_VERSION: v5.1
  PYTHON_VERSION: '3.10'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Build with ESP-IDF CI Action
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.ESP_IDF_VERSION }}
          target: esp32
          command: |
            idf.py reconfigure
            idf.py build
        
      - name: Get firmware size
        run: |
          ls -lh build/bootloader/bootloader.bin
          ls -lh build/partition_table/partition-table.bin
          ls -lh build/*.bin
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: |
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/*.bin
          retention-days: 7
          
      - name: Upload build directory
        uses: actions/upload-artifact@v4
        with:
          name: esp32-build
          path: build/
          retention-days: 7

  build-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          
      - name: Build with ESP-IDF CI Action
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.ESP_IDF_VERSION }}
          target: esp32
          command: |
            idf.py reconfigure
            idf.py build
        
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          files: |
            build/*.bin
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
